<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1000px;height:1000px;background:#09090b;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden;}
.glow{position:absolute;width:1000px;height:1000px;background:radial-gradient(540px circle at 50% 42%,rgba(16,185,129,0.22),transparent 60%);}
.wrap{position:relative;height:1000px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;}
.dot{width:90px;height:90px;border-radius:50%;background:#34d399;box-shadow:0 0 60px rgba(52,211,153,0.9);}
.mono{font-size:240px;font-weight:700;letter-spacing:-8px;line-height:1;background:linear-gradient(90deg,#fafafa,#d1fae5);-webkit-background-clip:text;background-clip:text;color:transparent;}
.name{color:#71717a;font-size:40px;font-weight:600;letter-spacing:6px;text-transform:uppercase;}
</style></head><body><div class="glow"></div><div class="wrap">
<div class="dot"></div><div class="mono">WFB</div><div class="name">Weekly Finance Brief</div>
</div></body></html>
