<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1500px;height:500px;background:#09090b;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden;}
.glow{position:absolute;width:1500px;height:500px;background:radial-gradient(620px circle at 20% 30%,rgba(16,185,129,0.18),transparent 55%),radial-gradient(700px circle at 90% 80%,rgba(16,185,129,0.10),transparent 60%);}
.wrap{position:relative;height:500px;padding:0 90px;display:flex;flex-direction:column;justify-content:center;gap:18px;}
.brand{display:flex;align-items:center;gap:16px;}
.dot{width:20px;height:20px;border-radius:50%;background:#34d399;box-shadow:0 0 24px rgba(52,211,153,0.9);}
.brandtxt{color:#fafafa;font-size:34px;font-weight:600;letter-spacing:-0.5px;}
h1{color:#fafafa;font-size:72px;line-height:1.05;font-weight:600;letter-spacing:-2px;}
.accent{background:linear-gradient(90deg,#34d399,#10b981);-webkit-background-clip:text;background-clip:text;color:transparent;}
.url{color:#71717a;font-size:30px;font-weight:500;margin-top:10px;}
</style></head><body><div class="glow"></div><div class="wrap">
<div class="brand"><div class="dot"></div><div class="brandtxt">Weekly Finance Brief</div></div>
<h1>The week in markets, <span class="accent">in five minutes.</span></h1>
<div class="url">Free 7-day trial &middot; weeklyfinancebrief.com</div>
</div></body></html>
